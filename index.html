<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{

background:
linear-gradient(
180deg,
#161622,
#0d0d16
);

color:white;

}

.header{

padding:25px;
text-align:center;

}

.avatar{

width:90px;
height:90px;

border-radius:50%;

background:url("avatar.jpg");

background-size:cover;

margin:auto;

box-shadow:
0 0 30px #7f5af0;

}

.bio{

opacity:.8;
margin-top:10px;

}

.score{

font-size:50px;

font-weight:bold;

margin:20px;

}

.mine{

width:220px;
height:220px;

margin:auto;

border-radius:50%;

background:

linear-gradient(
135deg,
#6d4aff,
#00c8ff
);

display:flex;

align-items:center;

justify-content:center;

font-size:70px;

cursor:pointer;

transition:.15s;

}

.mine:active{

transform:scale(.93);

}

.stats{

display:flex;

justify-content:space-around;

margin-top:20px;

}

.card{

background:#1f1f2d;

padding:15px;

border-radius:18px;

width:30%;

}

.bottom{

position:fixed;

bottom:0;

width:100%;

display:flex;

justify-content:space-around;

padding:15px;

background:#111;

}

.tab{

cursor:pointer;

}

</style>

</head>

<body>

<div class="header">

<div class="avatar"></div>

<h2>Washi</h2>

<div class="bio">

Developer • Gamer • Creator

</div>

</div>


<div align=center>

<div class="score">

<span id="score">

0

</span>

</div>


<div class="mine"
onclick="tap()">

⚡

</div>

</div>


<div class="stats">

<div class="card">

⚡ انرژی

<div id="energy">

30

</div>

</div>


<div class="card">

🚀 قدرت

<div id="power">

1

</div>

</div>


<div class="card">

⛏️ ماین

<div id="offline">

0

</div>

</div>

</div>


<div class="bottom">

<div class="tab">

🏠

</div>

<div class="tab">

🖼️

</div>

<div class="tab">

📈

</div>

<div class="tab">

👤

</div>

</div>


<script>

let score =
Number(
localStorage.score||0
);

let power =
Number(
localStorage.power||1
);

let energy =
Number(
localStorage.energy||30
);

let maxEnergy=
Number(
localStorage.maxEnergy||30
);


let last=
Number(
localStorage.last||Date.now()
);



// ⛏️ ماین آفلاین

let diff=
Math.floor(
(
Date.now()-last
)
/1000
);

let mined=
Math.floor(
diff/10
);

score+=mined;


update();



function tap(){

if(
energy<=0
){

return;

}

score+=power;

energy--;

save();

update();

}



function update(){

scoreEl=
document.getElementById(
"score"
);

scoreEl.innerText=
score;


document.getElementById(
"energy"
).innerText=

energy+

"/"+

maxEnergy;



document.getElementById(
"power"
).innerText=

power;


document.getElementById(
"offline"
).innerText=

"+1/10s";

}



function save(){

localStorage.score=
score;

localStorage.power=
power;

localStorage.energy=
energy;

localStorage.last=
Date.now();

}



setInterval(()=>{

if(
energy<
maxEnergy
){

energy++;

save();

update();

}

},5000);



// ارتقا

function levelUp(){

if(
score>=500
){

score-=500;

power++;

maxEnergy+=5;

}

}


update();

</script>

</body>
</html>
